<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Email confirmed</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-page">
  <div class="login-container">
    <h2 style="color:white; text-align:center;">✅</h2>
    <p style="color:white; text-align:center;" data-i18n="emailConfirmed">
      Your email has been successfully confirmed.
    </p>

    <button id="goToLoginBtn" class="apply-btn" data-i18n="goToLogin">
      Go to login
    </button>
  </div>

  <script src="languageManager.js"></script>
  <script type="module">
    import { supabase } from './supabaseClient.js';

    // This consumes the token in the URL
    await supabase.auth.getSession();
    
    document
    .getElementById('goToLoginBtn')
    .addEventListener('click', () => {
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>

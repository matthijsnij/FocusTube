<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../images/flavicon.png">
  <title>Email confirmed</title>
  <link rel="stylesheet" href="style.css" />
  <!-- NProgress: page transition loading bar -->
  <link rel="stylesheet" href="https://unpkg.com/nprogress@0.2.0/nprogress.css">
  <script src="https://unpkg.com/nprogress@0.2.0/nprogress.js"></script>
</head>
<body class="landing-page">
  <div class="login-container">
    <!-- Logo -->
    
    <h2 style="color:white; text-align:center;">✅</h2>
    <p style="color:#444; text-align:center;" data-i18n="emailConfirmed">
      Your email has been successfully confirmed.
    </p>

    <button id="goToLoginBtn" class="apply-btn" style="color:#444;" data-i18n="goToLogin">
      Go to login
    </button>
  </div>

  <script src="languageManager.js"></script>
  <script type="module">
    import { supabase } from './supabaseClient.js';

    // This consumes the token in the URL
    await supabase.auth.getSession();
    
    document
    .getElementById('goToLoginBtn')
    .addEventListener('click', () => {
      NProgress.start();
      window.location.href = 'login.html';
    });
  </script>
  <script>NProgress.done(true);</script>
</body>
</html>

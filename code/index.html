<!--
  FocusTube Landing page
  Purpose: Minimalistic landing page for searching videos
-->

<!-- Document type declaration -->
<!DOCTYPE html>

<!-- Root element of the HTML document, with language set to English -->
<html lang="en">

<head>
  <!-- Defines the character encoding so the browser can correctly display text -->
  <meta charset="UTF-8">
  
  <!-- Ensure proper scaling on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Roboto font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap" rel="stylesheet">

  <!-- Page title shown in browser tab -->
  <title>FocusTube</title>
  
  <!-- Link to external CSS stylesheet for styling -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Add logo to the page -->
  <div id="header-placeholder"></div>

  <!-- Main content area of the page -->
  <main class="container">

    <div class="page-content"> <!-- NOTE: this div is addedd quite late, might cause errors -->
      <!-- Main heading of the page -->
      <h1 id="search-title">What do you want to learn today?</h1>

      <!-- Text input field where the user types their search -->
      <!-- Specifies this is a text input -->
      <!-- Unique ID for JavaScript access -->
      <!-- Class name for CSS styling --> 
      <!-- Placeholder text gives examples of what the user can type -->
      <div class="search-wrapper">
        
        <input
          type="text" 
          id="searchInput" 
          class="search" 
          placeholder="e.g. History of the Roman Empire, How to play guitar, Python basics"
        >
        <!-- Filter icon for opening the filter popup menu -->
        <div class="filter-button">
          <img src="../images/filter_icon.png" alt="Filter Icon" class="filter-icon">
        </div>
      </div>
    </div>

    <!-- Overlay for dimmed effect when opening filters -->
    <div class="overlay" aria-hidden="true"></div>

    <!-- Popup menu for filters (initially hidden) -->
    <div id="filter-popup" class="filter-popup">

      <!-- Close button -->
      <button class="popup-close">&times;</button>
      
      <!-- Popup title -->
      <div class="popup-title-container">
        <img src="../images/filter_icon_transparent.png" alt="Filter Icon" class="popup-icon">
        <h2>Search filters</h2>
      </div>

      <!-- Filter options -->
      <!-- Each filter is a separate "Filter row", which has its own "Filter options" -->

      <!-- OPTION: Type -->
      <div class="filter-row type-filter">
        <span class="filter-name">Type</span>
        <div class="filter-options">
          <button type="button" class="filter-option">Video</button>
          <button type="button" class="filter-option">Channel</button>
        </div>
      </div>

      <!-- OPTION: Length -->
      <!-- Only there if type is not channel -->
      <div class="filter-row multi-select">
        <span class="filter-name">Length</span>
        <div class="filter-options">
          <button type="button" class="filter-option">&lt;4 minutes</button>
          <button type="button" class="filter-option">4-20 minutes</button>
          <button type="button" class="filter-option">&gt;20 minutes</button>
        </div>
      </div>

      <!-- OPTION: Upload date -->
      <!-- Only there if type is not channel -->
      <div class="filter-row single-select">
        <span class="filter-name">Upload date</span>
        <div class="filter-options">
          <button type="button" class="filter-option">Today</button>
          <button type="button" class="filter-option">This week</button>
          <button type="button" class="filter-option">This month</button>
          <button type="button" class="filter-option">This year</button>
        </div>
      </div>

      <!-- OPTION: Sorting mechanism -->
      <!-- Only there if type is not channel -->
      <div class="filter-row single-select">
        <span class="filter-name">Sort on</span>
        <div class="filter-options">
          <button type="button" class="filter-option">Relevance</button>
          <button type="button" class="filter-option">Upload date</button>
          <button type="button" class="filter-option">View count</button>
          <button type="button" class="filter-option">Rating</button>
        </div>
      </div>
    </div>

  </main>

  <!-- Link to external JavaScript file for interactivity -->
  <script src="script.js"></script>
  <!-- Link to external JavaScript which dynamically loads logo -->
  <script src="header.js"></script>

</body>
</html>

<!--
  FocusTube Landing page
  Purpose: Minimalistic landing page for searching videos
-->

<!-- Document type declaration -->
<!DOCTYPE html>

<!-- Root element of the HTML document, with language set to English -->
<html lang="en">

<head>
  <!-- Defines the character encoding so the browser can correctly display text -->
  <meta charset="UTF-8">
  
  <!-- Ensure proper scaling on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Roboto font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap" rel="stylesheet">

  <!-- Page title shown in browser tab -->
  <title>FocusTube</title>
  
  <!-- Link to external CSS stylesheet for styling -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="landing-page">
  <!-- Add logo to the page -->
  <div id="logo-placeholder"></div>

  <!-- Main content area of the page -->
  <main class="landing-container">

    <div class="landing-page-content"> 
      <!-- Main heading of the page -->
      <!-- <h1 id="search-title"> Focused learning</h1> -->
      <img id="search-title" src="../images/Focused Learning draft.png" alt="Focused learning" class="landing-logo">
      <h3 id="search-subtitle">Search Youtube distraction free</h2>

      <!-- What do you want to learn about?
      Learn anything, anywhere
      Content without distractions
      Knowledge without distractions
      Learn without distractions
      Explore without distractions
      Explore, distraction-free -->

      <!-- Text input field where the user types their search -->
      <!-- Specifies this is a text input -->
      <!-- Unique ID for JavaScript access -->
      <!-- Class name for CSS styling --> 
      <!-- Placeholder text gives examples of what the user can type -->
      <div class="search-wrapper-landing">
        <div class="search-container">
          <input
            type="text" 
            id="searchInput" 
            class="search" 
            placeholder="e.g. History of the Roman Empire, How to play guitar, Python basics"
          >
          <!-- Magnifying glass icon inside the input -->
          <div class="search-icon">
            <button type="button" id="searchButton">
              <img src="../images/magnifying_glass_transparent.png" alt="Search">
            </button>
          </div>
        </div>

        <!-- Filter icon for opening the filter popup menu -->
        <div class="filter-button">
          <img src="../images/icons8-filter-96.png" alt="Filter Icon" class="filter-icon">
        </div>
      </div>
    </div>
  </main>

  <!-- Link to external JavaScript file for handling search query -->
  <script src="query.js"></script>
  <!-- Link to external JavaScript which dynamically loads logo -->
  <script src="header.js"></script>
  <!-- Link to external JavaScript which injects filter popup -->
  <script src="filters.js"></script>
</body>
</html>

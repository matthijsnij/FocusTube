<!--
  FocusTube Results Page
  Purpose: Display search results for videos and play them in a modal.
-->

<!-- Document type declaration -->
<!DOCTYPE html>

<!-- Root element of the HTML document, with language set to English -->
<html lang="en">

<head>
  <!-- Defines character encoding -->
  <meta charset="UTF-8">

  <!-- Ensure proper scaling on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Roboto font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@200&display=swap" rel="stylesheet">

  <!-- Page title shown in browser tab -->
  <title>FocusTube Results</title>

  <!-- Link to external CSS stylesheet for styling -->
  <link rel="stylesheet" href="style.css">

  <!-- Internal CSS styles (specific to this page) -->
  <style>
    /* Basic modal styling (hidden by default) */
    #videoModal {
      display: none; /* Hidden until triggered */
      position: fixed; /* Stays in place even when scrolling */
      top: 0; left: 0; /* Covers the entire screen */
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); /* Semi-transparent dark overlay */
      justify-content: center; /* Centers modal horizontally */
      align-items: center; /* Centers modal vertically */
      z-index: 1000; /* Keeps modal above other elements */
    }

    /* The video player area */
    #player {
      width: 80%;
      height: 60%;
      background: black; /* Black background before video loads */
    }

    /* Close button for the modal (the × symbol) */
    #closeModal {
      position: absolute; /* Fixed position inside the modal */
      top: 20px; 
      right: 40px; 
      font-size: 24px; /* Larger text size */
      color: white; 
      cursor: pointer; /* Shows pointer on hover */
    }
  </style>

  <!-- Internal CSS for modal styling -->
  <style>
    /* Modal container: hidden by default, overlay for video player */
    #videoModal {
      display: none;                /* Hide modal initially */
      position: fixed;              /* Stay in viewport */
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%;
      background: rgba(0,0,0,0.8); /* Semi-transparent background */
      justify-content: center;      /* Center content horizontally */
      align-items: center;          /* Center content vertically */
      z-index: 1000;                /* Ensure modal is on top */
    }

    /* Video player container inside modal */
    #player {
      width: 80%;                   /* 80% of viewport width */
      height: 60%;                  /* 60% of viewport height */
      background: black;            /* Fallback background color */
    }

    /* Close button for modal */
    #closeModal {
      position: absolute;           /* Positioned relative to modal */
      top: 20px;                    /* NOTE: might not work on smaller screens, but can easily be made relative using % or rem*/
      right: 40px;                  /* NOTE: might not work on smaller screens, but can easily be made relative using % or rem*/
      font-size: 24px;              /* Large X symbol */
      color: white; 
      cursor: pointer;              /* Shows that X is clickable */
    }
  </style>
</head>

<body class="results-page">
  <!-- Top bar with logo, search bar -->
  <div class="top-bar-results">
    <div id="logo-placeholder"></div>
    <div class="search-wrapper-results">
      <div class="search-container">
        <input
          type="text" 
          id="searchInput" 
          class="search" 
        >
        <!-- Magnifying glass icon inside the input -->
        <div class="search-icon">
          <button type="button" id="searchButton">
            <img src="../images/magnifying_glass_transparent.png" alt="Search">
          </button>
        </div>
      </div>
      <!-- Filter icon for opening the filter popup menu -->
      <div class="filter-button">
        <img src="../images/filter-icon-dik-transparent.png" alt="Filter Icon" class="filter-icon">
      </div>
    </div>
  </div>


  <!-- Main container for search results -->
  <div class="results-container">
    <!-- Where the search results (video thumbnails, links, etc.) will appear -->
    <div id="results"></div>

    <!-- Load more button -->
    <button id="loadMoreButton" type="button" class="px-4 py-2 rounded shadow" style="display:none" data-i18n="loadmore-button">
      Load more...
    </button>
  </div>

  <!-- Modal Player (appears when user clicks on a video) -->
  <div id="videoModal">
    <!-- Close button (×) to exit the modal -->
    <span id="closeModal">&times;</span>

    <!-- Video player will be embedded here (YouTube iframe) -->
    <div id="player"></div>
  </div>

  <!-- Load the YouTube IFrame Player API (for embedding videos) -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <!-- Insert all JS functionality needed for this page: NOTE Order is important here -->
   <!-- Link to external JavaScript which contains language manager logic -->
  <script src="languageManager.js"></script>
   <!-- Then query logic -->
  <script src="query.js"></script>
  <!-- Injects filter popup -->
  <script src="filters.js"></script>
  <!-- Then results logic (search query, applying filters, videos) -->
  <script src="results.js"></script>
  <!-- Header/logo script can be last -->
  <script src="header.js"></script>
</body>
</html>

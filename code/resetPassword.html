<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset password</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="landing-page">
  <div class="login-container">

    <select id="loginLanguageSelect" class="settings-dropdown">
            <option value="en" data-i18n="language-default">English (default)</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="nl">Nederlands</option>
            <option value="pt">Português</option>
    </select>

    <!-- Logo -->
    <div class="login-logo">
        <img src="../images/FocusTube lightbulb transparant.png" alt="Logo" class="logo">
    </div>

    <p
      id="resetInstruction"
      style="color:white; text-align:center;"
      data-i18n="reset-instruction"
    >
      Enter your new password below
    </p>

    <input
      id="newPasswordInput"
      type="password"
      class="login-input"
      placeholder="Password must be at least 8 characters"
      data-i18n="new-password"
    />

    <button
      id="updatePasswordBtn"
      class="apply-btn"
      data-i18n="reset-password"
    >
      Reset password
    </button>

    <p
      id="resetSuccessMessage"
      style="display:none; color:white; text-align:center;"
      data-i18n="reset-success"
    >
      Your password has been updated successfully! You can now log in again.
    </p>

    <button
      id="goToLoginBtn"
      class="apply-btn"
      style="display:none;"
      data-i18n="goToLogin"
    >
      Go to login
    </button>

  </div>

  <script src="languageManager.js"></script>

  <script type="module">
    import { supabase } from './supabaseClient.js';

    // 🔑 Consume recovery token from URL
    const { data, error } = await supabase.auth.getSession();

    if (error || !data.session) {
      alert('Invalid or expired reset link.');
    }

    const newPasswordInput = document.getElementById('newPasswordInput');
    const updatePasswordBtn = document.getElementById('updatePasswordBtn');
    const resetSuccessMessage = document.getElementById('resetSuccessMessage');
    const goToLoginBtn = document.getElementById('goToLoginBtn');
    const resetInstruction = document.getElementById('resetInstruction');

    updatePasswordBtn.addEventListener('click', async () => {
      const newPassword = newPasswordInput.value.trim();

      if (newPassword.length < 8) {
        
        return;
      }

      const { error } = await supabase.auth.updateUser({
        password: newPassword
      });

      if (error) {
        alert('Failed to update password.');
        console.error(error);
        return;
      }

      // ✅ Success UI
      newPasswordInput.style.display = 'none';
      updatePasswordBtn.style.display = 'none';
      resetInstruction.style.display = 'none';

      resetSuccessMessage.style.display = 'block';
      goToLoginBtn.style.display = 'block';
    });

    goToLoginBtn.addEventListener('click', () => {
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>

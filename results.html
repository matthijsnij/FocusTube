<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusTube Results</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Basic modal styling */
    #videoModal {
      display: none; 
      position: fixed; 
      top: 0; left: 0; 
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); 
      justify-content: center; 
      align-items: center;
      z-index: 1000;
    }
    #player {
      width: 80%;
      height: 60%;
      background: black;
    }
    #closeModal {
      position: absolute;
      top: 20px; 
      right: 40px; 
      font-size: 24px; 
      color: white; 
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="results-container">
    <h2 id="search-title"></h2>
    <div id="results-loading">Finding the most relevant videos for you...</div>
    <div id="results"></div>
  </div>

  <!-- Modal Player -->
  <div id="videoModal">
    <span id="closeModal">&times;</span>
    <div id="player"></div>
  </div>

  <!-- Load YouTube API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="results.js"></script>
</body>
</html>
